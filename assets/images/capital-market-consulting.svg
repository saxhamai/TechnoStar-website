<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480" role="img" aria-label="Diagram illustrating capital market consulting services">
  <rect x="0" y="0" width="560" height="480" rx="28" fill="#F8FAFC"/>
  <rect x="40" y="60" width="480" height="360" rx="20" fill="#fff" stroke="#E2E8F0"/>

  <g stroke="#E2E8F0">
    <line x1="80" y1="380" x2="480" y2="380"/>
    <line x1="80" y1="120" x2="80" y2="380"/>
  </g>

  <g stroke="#0066FF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="90,340 150,300 200,320 260,240 320,270 380,180 440,210"/>
  </g>
  <g fill="#0066FF">
    <circle cx="90" cy="340" r="5"/>
    <circle cx="150" cy="300" r="5"/>
    <circle cx="260" cy="240" r="5"/>
    <circle cx="380" cy="180" r="5"/>
    <circle cx="440" cy="210" r="5"/>
  </g>

  <rect x="100" y="140" width="140" height="60" rx="12" fill="#EEF5FF"/>
  <text x="170" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0A2540">OMS / RMS</text>

  <rect x="320" y="100" width="150" height="60" rx="12" fill="#ECFDF3"/>
  <text x="395" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#0A2540">Exchange Link</text>

  <g fill="#0A2540">
    <rect x="40" y="20" width="180" height="16" rx="8" opacity=".9"/>
  </g>
</svg>
